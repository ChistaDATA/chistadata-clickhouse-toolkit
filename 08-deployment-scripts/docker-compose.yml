# Description: Docker Compose stack for deploying ClickHouse alongside
# Prometheus, Grafana dashboards, and chadmin management interface.
#
# Usage: docker compose up -d

version: '3.8'

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: chistadata-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9363:9363"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - chistadata-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: chistadata-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - chistadata-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: chistadata-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: changeme
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    depends_on:
      - prometheus
    networks:
      - chistadata-net

  chadmin:
    image: ghcr.io/chistadata/chadmin:latest
    container_name: chistadata-chadmin
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - chistadata-net

volumes:
  clickhouse-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  chistadata-net:
    driver: bridge
    name: chistadata-network
